<script>
    // 구글 시트의 CSV 게시 주소를 입력하세요.
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSP5-vHXke2MwMtOgCeXv8dZTCPIBU75OwW8bTnOBuOKcdAbbyNUMA1L__my6ch09rx5dezRUFmW9YS/pub?gid=0&single=true&output=csv';

    // CSV 텍스트를 파싱하여 새로운 한글 헤더 기준으로 객체화하는 함수
    function parseCSV(csvText) {
        const lines = csvText.split('\n').map(line => line.trim()).filter(line => line);
        if (lines.length <= 1) return [];

        // 첫 번째 줄(헤더)을 읽어옵니다. 공백을 제거하여 정확히 매칭되도록 합니다.
        const headers = lines[0].split(',').map(h => h.trim());
        
        return lines.slice(1).map(line => {
            const values = line.split(',').map(v => v.trim());
            const obj = {};
            headers.forEach((header, index) => {
                obj[header] = values[index] || '';
            });
            return obj;
        });
    }

    async function fetchDashboardData() {
        try {
            const response = await fetch(GOOGLE_SHEET_CSV_URL);
            if (!response.ok) throw new Error('구글 시트 로드 실패');
            
            const csvText = await response.text();
            const data = parseCSV(csvText);

            if (data && data.length > 0) {
                let totalSummary = data.length; // 행 개수를 총 점검 건수로 산정
                let successSummary = 0;
                let failSummary = 0;
                let tableRowsHtml = '';

                // 최신 데이터(첫 번째 행) 기준 상단 상태 정의
                const latestRow = data[0];
                const latestStatus = latestRow['상태'] || '';
                
                const statusText = document.getElementById('stat-status');
                const statusBadge = document.getElementById('badge-status');

                // '상태' 열에 '오류', '실패' 등이 포함되어 있는지 체크
                if (latestStatus.includes('오류') || latestStatus.includes('실패') || latestStatus.includes('정지')) {
                    statusText.innerText = "오류";
                    statusText.className = "text-2xl font-extrabold text-rose-500";
                    statusBadge.innerText = `⚠️ ${latestStatus}`;
                    statusBadge.className = "inline-flex items-center gap-1 bg-rose-50 text-rose-600 text-xs font-semibold px-2.5 py-1 rounded-full border border-rose-100";
                } else {
                    statusText.innerText = "정상";
                    statusText.className = "text-2xl font-extrabold text-blue-600";
                    statusBadge.innerText = "✓ 정상 운영 중";
                    statusBadge.className = "inline-flex items-center gap-1 bg-emerald-50 text-emerald-600 text-xs font-semibold px-2.5 py-1 rounded-full border border-emerald-100";
                }

                // 테이블 생성 및 통계 연산
                data.forEach(row => {
                    const date = row['날짜'] || '-';
                    const time = row['시간'] || '';
                    const method = row['접속 방법'] || '-';
                    const status = row['상태'] || '-';
                    const content = row['점검 내용'] || '-';
                    const rate = row['성공율'] || '0%';

                    // 상태에 따른 성공/실패 분류 구동
                    const isFail = status.includes('오류') || status.includes('실패');
                    if (isFail) {
                        failSummary++;
                    } else {
                        successSummary++;
                    }

                    // 기존 표 구조에 맞게 커스텀 결합하여 출력 (기간 열에 '날짜 시간' 결합 등)
                    tableRowsHtml += `
                        <tr class="hover:bg-slate-50/50">
                            <td class="py-3 px-6 font-medium text-slate-900">${date} ${time}</td>
                            <td class="py-3 px-6">${method}</td>
                            <td class="py-3 px-6 text-slate-500">${content}</td>
                            <td class="py-3 px-6 text-${isFail ? 'rose-500 font-bold' : 'emerald-600 font-medium'}">${status}</td>
                            <td class="py-3 px-6">
                                <div class="flex items-center gap-3">
                                    <span class="text-emerald-600 font-bold w-10">${rate}</span>
                                    <div class="w-24 bg-slate-100 h-2 rounded-full overflow-hidden">
                                        <div class="bg-emerald-500 h-full rounded-full" style="width: ${rate.includes('%') ? rate : rate + '%'}"></div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                // 대시보드 요약 상단 UI 카드 값 바인딩
                document.getElementById('stat-total').innerText = totalSummary;
                document.getElementById('stat-success').innerText = successSummary;
                document.getElementById('stat-fail').innerText = failSummary;
                
                const badgeFail = document.getElementById('badge-fail');
                if (failSummary > 0) {
                    badgeFail.classList.remove('hidden');
                } else {
                    badgeFail.classList.add('hidden');
                }

                // 종합 성공률 계산
                const totalRate = totalSummary > 0 ? Math.round((successSummary / totalSummary) * 100) : 0;
                document.getElementById('stat-rate').innerText = `${totalRate}%`;

                // 테이블 내부 데이터 갱신
                document.getElementById('table-data-body').innerHTML = tableRowsHtml;

                // 대시보드 헤더 정보 영역 갱신
                if(data.length > 0) {
                    document.getElementById('view-period').innerText = `조회기간: ${data[data.length - 1]['날짜'] || '-'} ~ ${data[0]['날짜'] || '-'}`;
                }
                document.getElementById('report-date').innerText = `작성일: ${new Date().toLocaleDateString()}`;
            } else {
                throw new Error('데이터가 비어 있습니다.');
            }
        } catch (error) {
            console.error("구글 시트 데이터 연동 실패:", error);
            document.getElementById('table-data-body').innerHTML = `
                <tr>
                    <td colspan="5" class="py-8 text-center text-rose-500 font-medium">
                        구글 시트 연동 실패. 시트의 헤더 명칭과 '웹에 게시' 설정을 재확인하세요.
                    </td>
                </tr>
            `;
        }
    }

    window.onload = fetchDashboardData;
</script>
