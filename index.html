<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아만다10 상태 기록 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #111111;
            --card-bg: #1a1a1a;
            --accent-color: #00ff7f;
            --danger-color: #ff4d4d;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 28px; }
        h1 span { color: var(--accent-color); }

        .btn-refresh {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        /* 대시보드 그리드 레이아웃 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .card.full-width {
            grid-column: span 3;
        }

        .card h3 {
            margin: 0 0 15px 0;
            color: var(--text-muted);
            font-size: 16px;
        }

        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* 상태별 텍스트 색상 */
        .status-정상 { color: var(--accent-color); font-weight: bold; }
        .status-오류 { color: var(--danger-color); font-weight: bold; }

        /* 테이블 스타일 */
        .table-container {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #222;
            color: var(--accent-color);
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        tr:hover {
            background-color: #222;
        }

        .loading {
            text-align: center;
            font-size: 20px;
            color: var(--text-muted);
            padding: 50px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><span>Amanda 10</span> 상태 기록 대시보드</h1>
        <button class="btn-refresh" onclick="fetchData()"><i class="fa-solid fa-rotate"></i> 새로고침</button>
    </header>

    <div id="loading-view" class="loading">
        <i class="fa-solid fa-spinner fa-spin"></i> 구글 시트에서 데이터를 불러오는 중입니다...
    </div>

    <div id="dashboard-view" style="display: none;">
        <div class="dashboard-grid">
            <div class="card">
                <h3>최근 점검 상태</h3>
                <div id="recent-status" class="value">-</div>
            </div>
            <div class="card">
                <h3>최근 업데이트 시각</h3>
                <div id="recent-time" class="value" style="font-size: 24px; padding-top: 8px;">-</div>
            </div>
            <div class="card">
                <h3>최근 성공율</h3>
                <div id="recent-success" class="value">-</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card full-width">
                <h3>최근 15회 점검 성공율 트렌드 (%)</h3>
                <div style="height: 260px; position: relative;">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card full-width" style="text-align: left;">
                <h3>상세 점검 로그 (최신순 15개)</h3>
                <div class="table-container">
                    <table id="data-table">
                        <thead>
                            <tr id="table-headers"></tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // CSV 파싱 규칙 수립 (쉼표 및 개행 처리)
    function parseCSV(text) {
        let lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        return lines.map(line => {
            let result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        });
    }

    let trendChart = null;

    async function fetchData() {
        document.getElementById('loading-view').style.display = 'block';
        document.getElementById('dashboard-view').style.display = 'none';

        // 구글 시트 CSV 내보내기 주소
        const csvUrl = "https://docs.google.com/spreadsheets/d/132r740wkRSzKtyRe1LKomEZ-2jmdVJmFDBDHYY_PPxc/export?format=csv&gid=0";
        
        try {
            const response = await fetch(`${csvUrl}&cachebust=${Date.now()}`);
            const dataText = await response.text();
            const data = parseCSV(dataText);

            if (data.length < 2) {
                alert("시트에 전송된 데이터가 없거나 올바르지 않습니다.");
                return;
            }

            const headers = data[0]; // [날짜, 시간, 접속 방법, 상태, 점검 내용, 성공율]
            const rows = data.slice(1);
            const lastRow = rows[rows.length - 1]; // 가장 최근에 추가된 행

            // 1. 상단 요약 카드 데이터 매핑
            const currentStatus = lastRow[3] || '알 수 없음';
            const statusTarget = document.getElementById('recent-status');
            statusTarget.innerText = currentStatus;
            statusTarget.className = currentStatus.includes('오류') ? 'value status-오류' : 'value status-정상';

            document.getElementById('recent-time').innerText = `${lastRow[0]} ${lastRow[1]}`;
            document.getElementById('recent-success').innerText = lastRow[5] || '0%';

            // 2. 테이블 헤더 및 바디 동적 생성 (최신순 역순 정렬)
            const headersRow = document.getElementById('table-headers');
            headersRow.innerHTML = '';
            headers.forEach(h => {
                const th = document.createElement('th');
                th.innerText = h;
                headersRow.appendChild(th);
            });

            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            
            const displayRows = [...rows].reverse().slice(0, 15); // 최신 15개 항목만 노출
            displayRows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach((cell, index) => {
                    const td = document.createElement('td');
                    td.innerText = cell;
                    // 상태 컬럼(3번 인덱스)에 색상 클래스 부여
                    if (index === 3) {
                        td.className = cell.includes('오류') ? 'status-오류' : 'status-정상';
                    }
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            // 3. 차트 시각화 데이터 바인딩 (최근 15개 흐름)
            const chartRows = rows.slice(-15);
            const labels = chartRows.map(r => r[1]); // 시간 축
            const successRates = chartRows.map(r => {
                let val = r[5] ? r[5].replace('%', '') : '0';
                return parseInt(val) || 0;
            });

            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) { trendChart.destroy(); }

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '점검 성공율 (%)',
                        data: successRates,
                        borderColor: '#00ff7f',
                        backgroundColor: 'rgba(0, 255, 127, 0.05)',
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.25,
                        pointBackgroundColor: chartRows.map(r => r[3].includes('오류') ? '#ff4d4d' : '#00ff7f'),
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: '#252525' }, ticks: { color: '#999', font: { size: 11 } } },
                        y: { min: 0, max: 100, grid: { color: '#252525' }, ticks: { color: '#999', stepSize: 20 } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("대시보드 데이터를 갱신하는 중 오류가 발생했습니다.");
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>
