<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아만다10 상태 추적 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 30px;
        }
        h1 { margin: 0; color: #2c3e50; font-size: 24px; }
        .refresh-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .refresh-btn:hover { background-color: #2980b9; }
        
        /* 대시보드 카드 영역 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card h3 { margin: 0 0 10px 0; color: #7f8c8d; font-size: 14px; text-transform: uppercase; }
        .card .value { font-size: 28px; font-weight: bold; color: #2c3e50; }
        .card .value.status-정상 { color: #2ecc71; }
        .card .value.status-오류 { color: #e74c3c; }

        /* 차트 및 테이블 영역 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        .table-wrapper {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .table-wrapper h2 { margin-top: 0; font-size: 18px; color: #2c3e50; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        
        /* 상태별 배지 스타일 */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge.정상 { background-color: #d1fae5; color: #065f46; }
        .badge.오류 { background-color: #fee2e2; color: #991b1b; }
        
        .loading { text-align: center; font-size: 18px; color: #7f8c8d; padding: 50px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 아만다10 상태 추적 대시보드</h1>
        <button class="refresh-btn" onclick="fetchData()">새로고침</button>
    </header>

    <div id="loading-view" class="loading">구글 시트에서 데이터를 불러오는 중...</div>

    <div id="dashboard-view" style="display: none;">
        <div class="cards-grid">
            <div class="card">
                <h3>최근 확인 시간</h3>
                <div class="value" id="lbl-last-time" style="font-size: 20px; padding-top: 8px;">-</div>
            </div>
            <div class="card">
                <h3>현재 상태</h3>
                <div class="value" id="lbl-status">-</div>
            </div>
            <div class="card">
                <h3>최근 성공률</h3>
                <div class="value" id="lbl-success-rate">-</div>
            </div>
            <div class="card">
                <h3>총 검사 횟수</h3>
                <div class="value" id="lbl-total-count">-</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="table-wrapper">
                <h2>전체 점검 이력 (최신순)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>시간</th>
                            <th>접속 방법</th>
                            <th>상태</th>
                            <th>점검 내용 / 에러 상세</th>
                            <th>성공률</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 중요: 아래 URL에 본인의 구글 시트 '웹에 게시(CSV)' 주소를 주입하세요.
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSP5-vHXke2MwMtOgCeXv8dZTCPIBU75OwW8bTnOBuOKcdAbbyNUMA1L__my6ch09rx5dezRUFmW9YS/pub?gid=0&single=true&output=csv';

    async function fetchData() {
        if(csvUrl === 'YOUR_GOOGLE_SHEET_CSV_URL_HERE') {
            alert('코드를 수정하여 구글 시트 웹 게시 CSV URL을 넣어주세요.');
            return;
        }
        
        document.getElementById('loading-view').style.display = 'block';
        document.getElementById('dashboard-view').style.display = 'none';

        try {
            const response = await fetch(csvUrl + '&cachebust=' + new Date().getTime());
            const data = await response.text();
            parseAndRenderData(data);
        } catch (error) {
            console.error(error);
            document.getElementById('loading-view').innerText = '데이터를 가져오지 못했습니다. URL 및 웹에 게시 설정을 확인하세요.';
        }
    }

    function parseAndRenderData(csvText) {
        // CSV 파싱 (줄바꿈 처리)
        const lines = csvText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        if (lines.length <= 1) {
            document.getElementById('loading-view').innerText = '시트에 기록된 데이터가 없습니다.';
            return;
        }

        // 데이터 파싱 (첫 줄 헤더 제외 여부는 데이터 구조에 따라 판단)
        // checker.py는 append_row만 하므로 헤더가 없을 수도 있고 있을 수도 있음.
        // 여기서는 안전하게 전체 행을 파싱하되 첫 행이 명백한 헤더('날짜' 등)인지 필터링합니다.
        let rows = lines.map(line => {
            // 쉼표 분할 기법 (단순 분할 기법 적용)
            return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, ''));
        });

        if (rows[0][0] === '날짜' || rows[0][4].includes('점검')) {
            rows.shift(); // 헤더 행 제거
        }

        // 최신 데이터가 맨 위로 오도록 정렬 (checker.py는 아래로 누적하므로 배열 역순 배치)
        rows.reverse();

        const latestRow = rows[0];
        
        // 데이터 구조 매핑: [날짜, 시간, 접속방법, 상태, 상세내용, 성공율]
        const totalCount = rows.length;
        const lastDate = latestRow[0] || '-';
        const lastTime = latestRow[1] || '-';
        const accessMethod = latestRow[2] || '-';
        const status = latestRow[3] || '-';
        const errorDetail = latestRow[4] || '-';
        const successRate = latestRow[5] || '-';

        // 요약 정보 주입
        document.getElementById('lbl-last-time').innerText = `${lastDate} ${lastTime}`;
        
        const statusLbl = document.getElementById('lbl-status');
        statusLbl.innerText = status;
        statusLbl.className = 'value ' + (status.includes('정상') ? 'status-정상' : 'status-오류');
        
        document.getElementById('lbl-success-rate').innerText = successRate;
        document.getElementById('lbl-total-count').innerText = totalCount + ' 회';

        // 테이블 출력 데이터 생성
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = '';

        rows.forEach(row => {
            if(row.length < 4) return; // 불완전한 행 제외
            
            const tr = document.createElement('tr');
            const badgClass = row[3].includes('정상') ? '정상' : '오류';
            
            tr.innerHTML = `
                <td>${row[0] || ''}</td>
                <td>${row[1] || ''}</td>
                <td>${row[2] || ''}</td>
                <td><span class="badge ${badgClass}">${row[3] || ''}</span></td>
                <td>${row[4] || ''}</td>
                <td><strong>${row[5] || '100%'}</strong></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('dashboard-view').style.display = 'block';
    }

    // 페이지 로드 시 즉시 데이터 호출
    window.onload = fetchData;
</script>
</body>
</html>
